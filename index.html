<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xiaozi craft</title>
    <style>
        html{
            font-family: 微软雅黑;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ffffff, #ffffff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s ease;
            position: relative;
        }
        body.dark {
            background: #0f172a;
        }

        body.dark h1 {
            color: #f1f5f9;
        }

        /* 右上角深色模式按钮 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
        }

        body.dark .theme-toggle {
            background: #1e293b;
            border-color: #475569;
            color: #f1f5f9;
        }

        .theme-toggle:hover {
            transform: scale(1.02);
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 48px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 40px;
            transition: color 0.3s ease;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            position: relative;
            top: -50px;
            left: -400px;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            border-radius: 40px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary {
            background: #ca1dff;
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: #1f557d;
        }

        .btn-secondary {
            background: white;
            color: #8722e6;
            border: 1px solid #cbd5e1;
        }

        body.dark .btn-secondary {
            background: #1e293b;
            color: #94a3b8;
            border-color: #475569;
        }

        body.dark .btn-secondary:hover {
            background: #334155;
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 32px;
            }
            .btn {
                padding: 10px 24px;
                font-size: 16px;
            }
            .theme-toggle {
                top: 12px;
                right: 12px;
                padding: 6px 12px;
                font-size: 12px;
            }
        }
        #div-h1 {
            position: relative;
            top: 70px;
            left: 512px;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
    </style>
</head>
<body>
    <!-- 深色模式按钮 -->
    <button class="theme-toggle" id="themeToggle">
        🌙 深色模式
    </button>

    <div class="container">
        <h1 id="div-h1">xiaozi craft</h1>
        <div class="buttons">
            <a href="https://www.curseforge.com/minecraft/modpacks/xiaozi-craft" class="btn btn-primary">前往下载</a>
            <a href="https://366862732.github.io/xiaozi-craft-docs.github.io/user-guide/intro.html" class="btn btn-secondary">技术文档</a>
        </div>
    </div>

    <script>
        const toggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
            toggle.innerHTML = '☀️ 亮色模式';
        }

        toggle.addEventListener('click', () => {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                toggle.innerHTML = '🌙 深色模式';
            } else {
                document.body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                toggle.innerHTML = '☀️ 亮色模式';
            }
        });
    </script>
</body>
</html>
